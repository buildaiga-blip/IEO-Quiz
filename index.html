<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class 2 English Olympiad Prep</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; height: 100vh; }
        #sidebar { width: 250px; background: #f4f4f4; padding: 20px; border-right: 1px solid #ccc; display: none; height: 100vh; overflow-y: auto; }
        #main { flex-grow: 1; padding: 40px; text-align: center; }
        .hidden { display: none; }
        .btn { display: block; width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 5px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #ddd; border: none; }
        .active-level { background: #333 !important; color: white !important; }
        .opt-btn { font-size: 18px; display: block; width: 100%; padding: 12px; margin: 8px 0; cursor: pointer; background: #f8f9fa; border: 1px solid #ccc; text-align: left; }
        .correct { background: #28a745 !important; color: white; }
        .nav-btn { padding: 10px 20px; margin: 20px 5px; cursor: pointer; }
        .timer {
            font-size: 14px;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .timer-bar-container {
            width: 100%;
            height: 8px;
            background-color: #f1f2f6;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .timer-bar {
            width: 100%;
            height: 100%;
            background-color: #e74c3c;
            transition: width 1s linear;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Topics</h3>
    <div id="topic-container"></div>
</div>

<div id="main">
    <div id="start-screen">
        <h1>English Olympiad Prep</h1>
        <button class="btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <div id="quiz-ui" class="hidden">
        <button onclick="toggleMute()">Mute/Unmute Music</button>
        <div style="margin: 20px 0;">
            <button id="basic" class="tab-btn active-level" onclick="selectLevel('basic')">Basic</button>
            <button id="advanced" class="tab-btn" onclick="selectLevel('advanced')">Advanced</button>
        </div>
        <div id="score-board">Score: 0</div>
        
        <div class="timer" id="timerDisplay">Time remaining: 15s</div>
        <div class="timer-bar-container">
            <div class="timer-bar" id="timerBar"></div>
        </div>

        <div id="quiz-area">
            <p id="question" style="font-size: 22px;"></p>
            <div id="options-container"></div>
        </div>
        <div>
            <button class="nav-btn" onclick="prevQuestion()">Previous</button>
            <button class="nav-btn" onclick="nextQuestion()">Next</button>
        </div>
    </div>
</div>

<audio id="bgm" src="background.mp3" loop></audio>

<script>
    let score = 0, currentLevel = 'basic', currentTopic = '', answered = false, currentData = {}, currentQ = 0;
    let timer, timeLeft = 15, isAnswerLocked = false;
    let currentSpeech = null; // Track active speech synthesis instance

    const topics = [
        "Spelling", 
        "Number, Gender and Animal world", 
        "Synonyms and Antonyms", 
        "Nouns", 
        "Pronouns", 
        "Verbs", 
        "Adjectives", 
        "Adverbs", 
        "Articles", 
        "Prepositions", 
        "Conjunctions", 
        "Tenses", 
        "Contractions and Jumbled Words; Punctuation", 
        "Spoken and Written Expression"
    ];

    const container = document.getElementById('topic-container');
    topics.forEach(t => {
        let b = document.createElement('button');
        b.className = 'btn'; b.innerText = t;
        b.onclick = () => selectTopic(t);
        container.appendChild(b);
    });

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('sidebar').style.display = 'block';
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('bgm').play();
        selectTopic('Spelling');
    }

    function toggleMute() { document.getElementById('bgm').muted = !document.getElementById('bgm').muted; }

    function selectLevel(lvl) {
        currentLevel = lvl;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-level'));
        document.getElementById(lvl).classList.add('active-level');
        currentQ = 0; loadQuestion();
    }

    async function selectTopic(topicName) {
        currentTopic = topicName; currentQ = 0;
        const fileName = topicName.toLowerCase().replace(/ /g, "_").replace(/,/g, "").replace(/;/g, "") + ".json";
        try {
            const res = await fetch(`data/${fileName}`);
            currentData = await res.json();
            loadQuestion();
        } catch (e) { document.getElementById('question').innerText = "Topic data not found: " + fileName; }
    }

    function loadQuestion() {
        // Safely cancel any active speech and clear utterance reference to prevent overlapping/double triggers
        if (currentSpeech) {
            window.speechSynthesis.cancel();
            currentSpeech = null;
        }
        
        clearInterval(timer);
        timeLeft = 15;
        isAnswerLocked = false;
        
        const timerDisplay = document.getElementById('timerDisplay');
        const timerBar = document.getElementById('timerBar');
        
        timerDisplay.textContent = `Time remaining: ${timeLeft}s`;
        timerBar.style.transition = 'none';
        timerBar.style.width = '100%';
        
        void timerBar.offsetWidth; // Force reflow
        timerBar.style.transition = 'width 1s linear';
        
        startTimer();

        if (!currentData[currentLevel]) return;
        answered = false;
        let d = currentData[currentLevel][currentQ];
        document.getElementById('question').innerText = d.q;
        let cont = document.getElementById('options-container'); cont.innerHTML = '';
        d.options.forEach((opt, i) => {
            let btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = opt;
            btn.onclick = () => { if(!answered && !isAnswerLocked) check(btn, i === d.correct); };
            cont.appendChild(btn);
        });
    }

    function check(btn, isCorrect) {
        if(answered || isAnswerLocked) return; 
        answered = true;
        isAnswerLocked = true;
        clearInterval(timer); // Stop timer immediately

        let d = currentData[currentLevel][currentQ];
        let options = document.getElementsByClassName('opt-btn');
        options[d.correct].classList.add('correct');

        if(isCorrect) { 
            score++; 
            document.getElementById('score-board').innerText = "Score: " + score; 
        } else { 
            btn.style.background = "#dc3545"; 
            btn.style.color = "white"; 
        }

        // Handle speech output safely and transition strictly after speech finishes
        let msg = new SpeechSynthesisUtterance("The correct answer is " + d.options[d.correct]);
        currentSpeech = msg;

        let hasAdvanced = false;

        function proceedToNext() {
            if (hasAdvanced) return;
            hasAdvanced = true;
            if (currentSpeech === msg) {
                currentSpeech = null;
            }
            nextQuestion();
        }

        msg.onend = proceedToNext;
        msg.onerror = proceedToNext;

        // Fallback safety timeout if browser speech hangs
        let safetyTimeout = setTimeout(proceedToNext, 4000);

        window.speechSynthesis.speak(msg);
    }

    function nextQuestion() {
        if (currentData[currentLevel] && currentQ < currentData[currentLevel].length - 1) { 
            currentQ++; 
            loadQuestion(); 
        } else {
            clearInterval(timer);
            if (currentSpeech) {
                window.speechSynthesis.cancel();
                currentSpeech = null;
            }
            document.getElementById('quiz-area').innerHTML = "<h2>Level Completed! 🎉</h2>";
        }
    }

    function prevQuestion() {
        if (currentQ > 0) { currentQ--; loadQuestion(); }
    }

    function startTimer() {
        const timerDisplay = document.getElementById('timerDisplay');
        const timerBar = document.getElementById('timerBar');

        timer = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = `Time remaining: ${timeLeft}s`;
            timerBar.style.width = `${(timeLeft / 15) * 100}%`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                autoForward();
            }
        }, 1000);
    }

    function autoForward() {
        if (answered || isAnswerLocked) return;
        isAnswerLocked = true;
        answered = true;

        let d = currentData[currentLevel][currentQ];
        let options = document.getElementsByClassName('opt-btn');
        if(options[d.correct]) {
            options[d.correct].classList.add('correct');
        }

        let msg = new SpeechSynthesisUtterance("The correct answer is " + d.options[d.correct]);
        currentSpeech = msg;

        let hasAdvanced = false;

        function proceedToNext() {
            if (hasAdvanced) return;
            hasAdvanced = true;
            if (currentSpeech === msg) {
                currentSpeech = null;
            }
            nextQuestion();
        }

        msg.onend = proceedToNext;
        msg.onerror = proceedToNext;

        let safetyTimeout = setTimeout(proceedToNext, 4000);

        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
